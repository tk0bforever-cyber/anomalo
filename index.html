<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Anómalo Horror Feed</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="topbar">
    <h1>ANÓMALO</h1>
  </header>

  <main class="feed">

    <div class="create-post">

      <input id="title" placeholder="Título de la historia">
      <textarea id="content" placeholder="Escribe tu historia..."></textarea>
      <button id="publish">Publicar</button>

    </div>

  </main>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <script src="script.js"></script>

</body>
</html>
