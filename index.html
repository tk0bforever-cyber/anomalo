<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anómalo | Horror Feed</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <h1>ANÓMALO</h1>
  </header>

  <!-- LAYOUT -->
  <main class="feed">

    <!-- 🧠 FORMULARIO PARA CREAR HISTORIAS -->
    <div class="create-post">

      <h3>Escribe una historia</h3>

      <input id="title" type="text" placeholder="Título de la historia">

      <textarea id="content" placeholder="Escribe lo que pasó..."></textarea>

      <button id="publish">Publicar</button>

    </div>

    <!-- 🧟 POSTS DE EJEMPLO -->
    <div class="post">
      <h3>Escuché golpes en la pared</h3>
      <p>Vivo solo, pero cada noche alguien responde desde adentro...</p>
      <span>👁 Anónimo</span>
    </div>

    <div class="post">
      <h3>La cámara grabó algo detrás de mí</h3>
      <p>Yo estaba solo… pero no aparezco solo en el video.</p>
      <span>👁 Anónimo</span>
    </div>

  </main>

  <!-- 🔥 SCRIPT (IMPORTANTE) -->
  <script src="script.js" defer></script>

</body>
</html>
