<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PALE LUNA</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:"Courier New", monospace;
    overflow:hidden;
    padding:30px;
}

#screen{
    white-space:pre-line;
    font-size:22px;
    line-height:1.6;
}

input{
    background:black;
    color:white;
    border:none;
    outline:none;
    font-family:"Courier New", monospace;
    font-size:22px;
    width:300px;
}

.glitch{
    animation:glitch 0.08s infinite;
}

@keyframes glitch{

    0%{
        transform:translate(0px,0px);
    }

    20%{
        transform:translate(-2px,1px);
    }

    40%{
        transform:translate(2px,-1px);
    }

    60%{
        transform:translate(-1px,-2px);
    }

    80%{
        transform:translate(1px,2px);
    }

    100%{
        transform:translate(0px,0px);
    }

}

.flash{
    animation:flash 0.2s infinite;
}

@keyframes flash{

    0%{
        background:black;
        color:white;
    }

    50%{
        background:white;
        color:black;
    }

    100%{
        background:black;
        color:white;
    }

}

#noise{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    opacity:0.05;
    background:url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png");
}

</style>
</head>
<body>

<div id="noise"></div>

<div id="screen"></div>

<script>

const screen = document.getElementById("screen");

const intro = [

"BOOTING...",
"",
"LOADING FILES...",
"",
"PALE LUNA",
"",
"YOU ARE IN A DARK PLACE.",
"",
"THERE IS A PALE MOON.",
"",
"PATHS:",
"",
"- NORTH",
"- SOUTH",
"",
">"

];

let line = 0;

function typeIntro(){

    if(line < intro.length){

        screen.innerHTML += intro[line] + "\n";

        line++;

        setTimeout(typeIntro,1000);

    }
    else{

        commandInput();

    }

}

typeIntro();

function commandInput(){

    const input = document.createElement("input");

    screen.appendChild(input);

    input.focus();

    input.addEventListener("keydown", function(e){

        if(e.key === "Enter"){

            const cmd = input.value.toLowerCase();

            screen.innerHTML += cmd + "\n";

            input.remove();

            processCommand(cmd);

        }

    });

}

function processCommand(cmd){

    if(cmd === "north"){

        northScene();

    }
    else if(cmd === "south"){

        southScene();

    }
    else{

        screen.innerHTML +=
        "\nUNKNOWN COMMAND.\n\n>";

        commandInput();

    }

}

function northScene(){

    setTimeout(()=>{

        screen.innerHTML +=
        "\nYOU WALK NORTH.\n";

    },1000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nTHE TREES ARE DEAD.\n";

    },3000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nYOU HEAR BREATHING.\n";

    },5000);

    setTimeout(()=>{

        document.body.classList.add("glitch");

    },7000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nRUN.\n";

    },9000);

    setTimeout(()=>{

        document.body.classList.add("flash");

    },11000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nTHE MOON IS WATCHING.\n";

    },13000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nDON'T LOOK BACK.\n";

    },15000);

    setTimeout(()=>{

        document.body.style.background = "black";

        screen.innerHTML +=
        "\n\nCONNECTION LOST.";

    },18000);

}

function southScene(){

    setTimeout(()=>{

        screen.innerHTML +=
        "\nYOU WALK SOUTH.\n";

    },1000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nNOTHING IS THERE.\n";

    },3000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nYOU FEEL ALONE.\n";

    },5000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nTHE MOON DISAPPEARS.\n";

    },7000);

    setTimeout(()=>{

        screen.innerHTML +=
        "\nYOU ARE SAFE.\n";

    },9000);

}

</script>

</body>
</html>
