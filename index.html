<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pale Moon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Courier New, monospace;
}

body{
    background:black;
    overflow:hidden;
    color:white;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    background:
    radial-gradient(circle at center, #111 0%, #000 70%);
}

#moon{
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:#dcdcdc;
    top:40px;
    right:80px;
    box-shadow:
    0 0 30px white,
    0 0 80px #aaa;
    animation: pulse 5s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.7;}
    100%{opacity:1;}
}

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:180px;
    background:#050505;
    border-top:3px solid #222;
}

.tree{
    position:absolute;
    bottom:180px;
    width:20px;
    background:#111;
}

.tree::before{
    content:'';
    position:absolute;
    bottom:100%;
    left:-30px;
    width:80px;
    height:120px;
    background:#0a0a0a;
    clip-path:polygon(50% 0%, 100% 100%, 0% 100%);
}

#player{
    position:absolute;
    width:40px;
    height:70px;
    background:#111;
    border:2px solid #444;
    bottom:180px;
    left:120px;
    transition:0.05s;
}

#eye{
    position:absolute;
    width:8px;
    height:8px;
    background:red;
    top:20px;
    right:8px;
    border-radius:50%;
    box-shadow:0 0 10px red;
}

#message{
    position:absolute;
    top:20px;
    left:20px;
    font-size:20px;
    color:#999;
    text-shadow:0 0 10px white;
}

#shadow{
    position:absolute;
    width:60px;
    height:90px;
    background:black;
    border:2px solid crimson;
    bottom:180px;
    right:200px;
    opacity:0;
    transition:1s;
}

#shadowEye1,
#shadowEye2{
    position:absolute;
    width:10px;
    height:10px;
    background:red;
    border-radius:50%;
    top:20px;
    box-shadow:0 0 10px red;
}

#shadowEye1{left:12px;}
#shadowEye2{right:12px;}

.flash{
    animation: flash 0.15s infinite;
}

@keyframes flash{
    0%{background:black;}
    50%{background:#220000;}
    100%{background:black;}
}

#finalText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:50px;
    color:red;
    opacity:0;
    text-shadow:0 0 20px crimson;
    transition:2s;
}

</style>
</head>
<body>

<div id="game">

    <div id="moon"></div>

    <div id="message">
        ← → para moverte
    </div>

    <div class="tree" style="left:300px;height:150px;"></div>
    <div class="tree" style="left:500px;height:180px;"></div>
    <div class="tree" style="left:750px;height:140px;"></div>
    <div class="tree" style="left:1000px;height:170px;"></div>

    <div id="player">
        <div id="eye"></div>
    </div>

    <div id="shadow">
        <div id="shadowEye1"></div>
        <div id="shadowEye2"></div>
    </div>

    <div id="ground"></div>

    <div id="finalText">
        THE MOON IS WATCHING
    </div>

</div>

<script>

const player = document.getElementById("player");
const shadow = document.getElementById("shadow");
const finalText = document.getElementById("finalText");
const game = document.getElementById("game");

let x = 120;
let stage = 0;

document.addEventListener("keydown", (e)=>{

    if(e.key === "ArrowRight"){
        x += 20;
    }

    if(e.key === "ArrowLeft"){
        x -= 20;
    }

    player.style.left = x + "px";

    // EVENTO 1
    if(x > 400 && stage === 0){
        stage = 1;

        setTimeout(()=>{
            document.getElementById("message").innerHTML =
            "No deberías estar aquí...";
        },1000);
    }

    // EVENTO 2
    if(x > 700 && stage === 1){
        stage = 2;

        shadow.style.opacity = 1;

        setTimeout(()=>{
            shadow.style.right = "500px";
        },500);

        setTimeout(()=>{
            document.getElementById("message").innerHTML =
            "Míralo.";
        },2000);
    }

    // FINAL
    if(x > 1000 && stage === 2){
        stage = 3;

        game.classList.add("flash");

        setTimeout(()=>{
            finalText.style.opacity = 1;
        },1000);

        setTimeout(()=>{
            document.getElementById("message").innerHTML =
            "PALE LUNA";
        },2000);

        setTimeout(()=>{
            alert("No hay regreso.");
        },4000);
    }

});

</script>

</body>
</html>
